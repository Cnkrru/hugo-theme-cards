<pre class="mermaid">
  {{ .Inner | htmlEscape | safeHTML }}
</pre>
{{ if not (.Page.Store.Get "mermaidScriptLoaded") }}
{{ .Page.Store.Set "mermaidScriptLoaded" true }}
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.12.2/+esm';
    mermaid.initialize({
        startOnLoad: true,
        theme: 'neutral',
    });
</script>
{{ end }}
