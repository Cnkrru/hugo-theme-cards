<div class="post-menu-container">
  <div class="post-menu-btn-container">
    <button class="post-menu-btn" data-action="post-menu:toggle">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M3 9h14V7H3v2zm0 4h14v-2H3v2zm0 4h14v-2H3v2zm16 0h2v-2h-2v2zm0-10v2h2V7h-2zm0 6h2v-2h-2v2z"/>
      </svg>
      <span data-i18n="toggleMenu">菜单</span>
    </button>
  </div>

  <div class="post-menu-card" id="post-menu-card">
    <div class="post-menu-card-header">
      <h3 data-i18n="articleMenu">文章菜单</h3>
      <button class="post-menu-close-btn" data-action="post-menu:toggle" aria-label="关闭菜单">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="20" height="20">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="post-menu-card-content">
      <div class="post-menu-controls">
        <div class="search-box">
          <input
            type="text"
            id="post-menu-search"
            data-i18n-placeholder="searchArticle"
            placeholder="搜索文章..."
            class="menu-search-input"
          />
          <button id="post-menu-clear" data-action="post-menu:clear" class="menu-clear-search-btn" style="display:none">×</button>
        </div>
      </div>
      <ul class="post-list" id="post-menu-list">
        {{ $pages := where .Site.RegularPages "Type" "posts" }}
        {{ range $index, $page := $pages }}
        <li class="post-list-item" data-action="post-menu:navigate" data-url="{{ $page.RelPermalink }}">
          <span class="post-id">#{{ add $index 1 }}</span>
          <span class="post-title">{{ $page.LinkTitle }}</span>
          <span class="post-date">{{ $page.Date.Format "2006-01-02" }}</span>
        </li>
        {{ end }}
      </ul>
    </div>
  </div>
</div>

<script>
Cards.register('post-menu', {
  init: function() {
    const input = document.getElementById('post-menu-search');
    const clearBtn = document.getElementById('post-menu-clear');

    const filterMenu = function() {
      const query = input.value.toLowerCase();
      if (clearBtn) clearBtn.style.display = query ? 'block' : 'none';
      const items = document.querySelectorAll('#post-menu-list .post-list-item');
      items.forEach(function(item) {
        const title = item.querySelector('.post-title').textContent.toLowerCase();
        item.style.display = title.includes(query) ? '' : 'none';
      });
    };

    const closeMenu = function() {
      const card = document.getElementById('post-menu-card');
      if (card) card.classList.remove('active');
      if (input) input.value = '';
      filterMenu();
    };

    closeMenu();

    if (input) input.addEventListener('input', filterMenu);

    return { input: input, filterMenu: filterMenu, closeMenu: closeMenu };
  },
  destroy: function(instance) {
    if (instance.input) instance.input.removeEventListener('input', instance.filterMenu);
    instance.closeMenu();
  }
});

Cards.actions['post-menu:toggle'] = function() {
  const card = document.getElementById('post-menu-card');
  if (card) card.classList.toggle('active');
};

Cards.actions['post-menu:clear'] = function() {
  const input = document.getElementById('post-menu-search');
  if (input) {
    input.value = '';
    input.dispatchEvent(new Event('input'));
  }
};

Cards.actions['post-menu:navigate'] = function(e, target) {
  const url = target.dataset.url;
  if (url) {
    const card = document.getElementById('post-menu-card');
    if (card) card.classList.remove('active');
    window.location.href = url;
  }
};
</script>
