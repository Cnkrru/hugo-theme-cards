<div class="reading-time-wrapper">
  <div class="reading-time-container" id="reading-time-container">
    <div class="word-count-section">
      <span class="word-count-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
      </span>
      <span class="word-count-text" id="word-count-text">字数统计: 计算中...</span>
      <span class="word-count-detail" id="word-count-detail"></span>
    </div>
    <div class="reading-time-section">
      <span class="reading-time-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </span>
      <span class="reading-time-text" id="reading-time-text">预计阅读时间: 计算中...</span>
    </div>
  </div>
</div>

<script>
(function() {
  const calculateReadingStats = () => {
    const contentElement = document.querySelector('.post-content');
    if (!contentElement) return null;

    const clone = contentElement.cloneNode(true);
    const codeBlocks = clone.querySelectorAll('pre, code');
    let codeText = '';
    codeBlocks.forEach(block => {
      codeText += block.textContent + ' ';
      block.remove();
    });

    const text = clone.textContent || '';
    const chineseChars = text.match(/[\u4e00-\u9fa5]/g) || [];
    const chineseCount = chineseChars.length;
    const englishWords = text.match(/[a-zA-Z]+/g) || [];
    const englishCount = englishWords.length;
    const codeCount = codeText.length;

    const wordsPerMinute = 300;
    const codeWordsPerMinute = 100;
    const textTime = (chineseCount + englishCount) / wordsPerMinute;
    const codeTime = codeCount / codeWordsPerMinute;
    const totalTime = textTime + codeTime;
    const minutes = Math.max(1, Math.ceil(totalTime));

    return {
      minutes: minutes,
      chineseCount: chineseCount,
      englishCount: englishCount,
      codeCount: codeCount,
      totalWords: chineseCount + englishCount + codeCount
    };
  };

  const formatTime = (minutes) => {
    const t = window.i18nTranslations && window.i18nTranslations[window.i18nCurrentLang];
    const lessThanOne = t ? t['lessThanOneMinute'] : '小于 1 分钟';
    const minuteLabel = t ? t['minute'] : '分钟';
    const hourLabel = t ? t['hour'] : '小时';

    if (minutes < 1) {
      return lessThanOne;
    } else if (minutes === 1) {
      return '1 ' + minuteLabel;
    } else if (minutes < 60) {
      return minutes + ' ' + minuteLabel;
    } else {
      const hours = Math.floor(minutes / 60);
      const remainingMinutes = minutes % 60;
      if (remainingMinutes === 0) {
        return hours + ' ' + hourLabel;
      } else {
        return hours + ' ' + hourLabel + ' ' + remainingMinutes + ' ' + minuteLabel;
      }
    }
  };

  const updateDisplay = () => {
    const stats = calculateReadingStats();
    if (!stats) return;

    const t = window.i18nTranslations && window.i18nTranslations[window.i18nCurrentLang];

    const wordCountText = document.getElementById('word-count-text');
    const wordCountDetail = document.getElementById('word-count-detail');
    const readingTimeText = document.getElementById('reading-time-text');

    if (wordCountText) {
      wordCountText.textContent = t
        ? t['wordCountLabel'] + ' ' + stats.totalWords + ' ' + t['wordCount']
        : '字数统计: ' + stats.totalWords + ' 字';
    }

    if (wordCountDetail) {
      wordCountDetail.textContent = '(' +
        stats.chineseCount + (t ? t['chinese'] : '中文') + ' / ' +
        stats.englishCount + (t ? t['english'] : '英文') + ' / ' +
        stats.codeCount + (t ? t['code'] : '代码') + ')';
    }

    if (readingTimeText) {
      readingTimeText.textContent = (t ? t['readingTimeLabel'] : '预计阅读时间: ') + formatTime(stats.minutes);
    }
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(updateDisplay, 300));
  } else {
    setTimeout(updateDisplay, 300);
  }
})();
</script>
