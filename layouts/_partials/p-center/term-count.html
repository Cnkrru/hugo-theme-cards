{{- $dict := . -}}
{{- $termCount := $dict.count -}}
{{- $taxonomy := $dict.taxonomy -}}
{{- $labelMap := dict "tags" "tagsLabel" "categories" "categoriesLabel" -}}
{{- $labelKey := index $labelMap $taxonomy -}}

<button class="term-count-btn">
  <span><span data-i18n="totalTerms">共</span> <span id="term-count">{{ $termCount }}</span> <span data-i18n="{{ $labelKey }}">个分类</span></span>
</button>

<style>
.term-count-btn {
  font-size: 14px;
  font-weight: bold;
  padding: 8px 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
  transition: all 0.3s ease;
}
</style>

<style>
.term-count-btn {
  background-color: var(--common-color-1);
  border: 2px solid var(--common-color-1);
  color: var(--common-content);
}
</style>
