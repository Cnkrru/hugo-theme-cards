{{ $current := .current | default 1 }}
{{ $total := .total | default 1 }}
{{ $prefix := .prefix | default "" }}

<div class="page-nav-container" id="{{ $prefix }}page-nav">
  <div class="nav-section">
    <button
      class="nav-btn prev-btn"
      id="{{ $prefix }}prev-btn"
      data-page="{{ $prefix }}"
      data-delta="-1"
      {{ if le $current 1 }}disabled{{ end }}
    >
      &lt; <span data-i18n="prev">上一页</span>
    </button>
  </div>

  <div class="nav-section page-buttons-section">
    <div class="page-buttons" id="{{ $prefix }}page-buttons">
      {{ range $i := seq $total }}
      <button
        class="page-btn{{ if eq $i $current }} active{{ end }}"
        id="{{ $prefix }}page-btn-{{ $i }}"
        data-page="{{ $prefix }}"
        data-goto="{{ $i }}"
      >
        {{ $i }}
      </button>
      {{ end }}
    </div>
  </div>

  <div class="nav-section">
    <button
      class="nav-btn next-btn"
      id="{{ $prefix }}next-btn"
      data-page="{{ $prefix }}"
      data-delta="1"
      {{ if ge $current $total }}disabled{{ end }}
    >
      <span data-i18n="next">下一页</span> &gt;
    </button>
  </div>

  <div class="page-info" id="{{ $prefix }}page-info">
    <span data-i18n="page">第</span> {{ $current }} / {{ $total }} <span data-i18n="page">页</span>
  </div>
</div>

<style>
.page-nav-container {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px;
  border-radius: 8px;
  position: relative;
  width: 100%;
}

.nav-section {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.page-buttons-section {
  flex-wrap: wrap;
}

.page-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.nav-btn {
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 14px;
}

.nav-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.prev-btn, .next-btn {
  min-width: 100px;
}

.page-btn {
  padding: 8px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 14px;
  min-width: 40px;
}

.page-info {
  text-align: center;
  font-size: 14px;
  width: 100%;
}
</style>

<style>
.nav-btn {
  border: 1px solid var(--common-color-1);
  background: var(--common-color-1);
  color: white;
}

.page-btn {
  background: var(--common-color-1);
  color: white;
  border: 1px solid var(--common-color-1);
}

.page-btn.active {
  background: var(--common-hover);
  color: white;
  border-color: var(--common-color-1);
}

.page-info {
  color: var(--common-text);
}
</style>

<style>
@media (max-width: 575px) {
  .page-nav-container {
    padding: 10px;
    gap: 10px;
  }

  .nav-btn {
    padding: 6px 12px;
    font-size: 13px;
  }

  .prev-btn, .next-btn {
    min-width: 80px;
  }

  .page-btn {
    padding: 6px 10px;
    font-size: 13px;
    min-width: 60px;
  }
}

@media (max-width: 768px) {
  .page-nav-container {
    padding: 12px;
    gap: 12px;
  }

  .nav-btn {
    padding: 7px 14px;
    font-size: 13px;
  }

  .prev-btn, .next-btn {
    min-width: 90px;
  }

  .page-btn {
    padding: 7px 12px;
    font-size: 13px;
    min-width: 70px;
  }
}
</style>
