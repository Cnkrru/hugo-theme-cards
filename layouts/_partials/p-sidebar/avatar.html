{{ if .Site.Params.sidebar.avatar.enabled }}
<div class="avator-card">
  <a href="{{ absLangURL "/" }}">
    <img src="{{ .Site.Params.sidebar.avatar.src | default "/images/avator.jpg" }}" alt="头像">
  </a>
</div>

<style>
.avator-card {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  overflow: hidden;
}

.avator-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: all 0.3s ease;
  border-radius: 50%;
}

.avator-card:hover img {
  transform: rotate(360deg);
}
</style>

<style>
.avator-card {
  border: 3px solid var(--common-color-1);
}
</style>
{{ end }}
