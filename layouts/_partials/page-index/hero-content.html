<main class="index-hero-content">
  <div class="index-hero-text">
    <p class="index-hero-subtitle">
      <span class="index-glow-text">HELLO WORLD</span>
    </p>
    <h1 class="index-hero-title">
      <span class="index-typing-text" id="index-typing-text"></span>
      <span class="index-cursor-blink">|</span>
    </h1>
  </div>

  <div class="index-hero-buttons">
    <a href="{{ relLangURL "/list/" }}" data-no-pjax class="index-btn index-btn-primary">
      <span class="index-btn-text" data-i18n="start">开始</span>
      <span class="index-btn-glow"></span>
    </a>
  </div>
</main>

<script>
Cards.register('hero-typing', {
  init: function() {
    let typingText = '';
    let typingIndex = 0;
    let isDeleting = false;
    let isPausing = false;
    let lastTime = 0;
    let animationFrameId = null;

    const text = 'Welcome to Cnkrru\'s Blog';
    const typingSpeed = 150;
    const deletingSpeed = 80;
    const pauseTime = 2000;
    const loop = true;
    const randomSpeed = true;

    const targetElement = document.getElementById('index-typing-text');
    if (!targetElement) return { animationFrameId: null };

    const getRandomSpeed = function(baseSpeed) {
      if (!randomSpeed) return baseSpeed;
      return baseSpeed * (0.8 + Math.random() * 0.4);
    };

    const typeEffect = function(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const elapsed = timestamp - lastTime;

      if (isPausing) {
        if (elapsed >= pauseTime) {
          isPausing = false;
          isDeleting = true;
          lastTime = timestamp;
        }
      } else if (!isDeleting) {
        const currentSpeed = getRandomSpeed(typingSpeed);
        if (elapsed >= currentSpeed) {
          if (typingIndex < text.length) {
            typingText = text.substring(0, typingIndex + 1);
            targetElement.textContent = typingText;
            typingIndex++;
            lastTime = timestamp;
          } else if (loop) {
            isPausing = true;
            lastTime = timestamp;
          }
        }
      } else {
        const delSpeed = getRandomSpeed(deletingSpeed);
        if (elapsed >= delSpeed) {
          if (typingIndex > 0) {
            typingIndex--;
            typingText = text.substring(0, typingIndex);
            targetElement.textContent = typingText;
            lastTime = timestamp;
          } else if (loop) {
            isDeleting = false;
            lastTime = timestamp;
          }
        }
      }

      animationFrameId = requestAnimationFrame(typeEffect);
    };

    setTimeout(function() {
      lastTime = 0;
      animationFrameId = requestAnimationFrame(typeEffect);
    }, 300);

    return { animationFrameId: animationFrameId };
  },
  destroy: function(instance) {
    if (instance.animationFrameId) cancelAnimationFrame(instance.animationFrameId);
  }
});
</script>
