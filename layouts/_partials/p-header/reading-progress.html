<div class="reading-progress-container">
  <div class="reading-progress-bar" id="reading-progress-bar"></div>
</div>

<script>
Cards.register('reading-progress', {
  init: function() {
    let targetElement = null;
    let cachedContentCard = null;
    let observer = null;

    const findContentCard = function() {
      if (cachedContentCard) return cachedContentCard;
      cachedContentCard = document.querySelector('.center-card-content');
      return cachedContentCard;
    };

    const handleScroll = function() {
      const progressBar = document.getElementById('reading-progress-bar');
      if (!progressBar) return;

      let progress;
      if (targetElement) {
        const scrollTop = targetElement.scrollTop;
        const scrollHeight = targetElement.scrollHeight;
        const clientHeight = targetElement.clientHeight;
        const scrollPercent = (scrollTop / (scrollHeight - clientHeight)) * 100;
        progress = Math.min(scrollPercent, 100);
      } else {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPercent = (scrollTop / docHeight) * 100;
        progress = Math.min(scrollPercent, 100);
      }
      progressBar.style.width = progress + '%';
    };

    const updateTargetElement = function() {
      const newElement = findContentCard();
      if (newElement !== targetElement) {
        if (targetElement) {
          targetElement.removeEventListener('scroll', handleScroll);
        }
        targetElement = newElement;
        if (targetElement) {
          targetElement.addEventListener('scroll', handleScroll);
        }
        handleScroll();
      }
    };

    updateTargetElement();

    window.addEventListener('hashchange', updateTargetElement);
    window.addEventListener('popstate', updateTargetElement);

    if (targetElement) {
      observer = new ResizeObserver(function() { handleScroll(); });
      observer.observe(targetElement);
    } else {
      window.addEventListener('resize', handleScroll);
    }

    handleScroll();

    return {
      targetElement: targetElement,
      observer: observer,
      handleScroll: handleScroll,
      updateTargetElement: updateTargetElement
    };
  },
  destroy: function(instance) {
    if (instance.targetElement) {
      instance.targetElement.removeEventListener('scroll', instance.handleScroll);
    }
    if (instance.observer) {
      instance.observer.disconnect();
    }
    window.removeEventListener('hashchange', instance.updateTargetElement);
    window.removeEventListener('popstate', instance.updateTargetElement);
    window.removeEventListener('resize', instance.handleScroll);
  }
});
</script>

<style>
.reading-progress-container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  z-index: 1001;
}

.reading-progress-bar {
  height: 100%;
  transition: width 0.2s ease;
  border-radius: 0 3px 3px 0;
}
</style>

<style>
.reading-progress-container {
  background-color: transparent;
}

.reading-progress-bar {
  background: var(--common-gradient);
  box-shadow: 0 0 8px var(--common-shadow);
}
</style>
