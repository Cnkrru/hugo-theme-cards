<div
  class="button-style theme-toggle-btn"
  data-action="theme:toggle"
  aria-label="切换主题"
  role="button"
  tabindex="0"
>
  <img src="/images/svg/theme-toggle.svg" alt="" id="theme-toggle-icon" aria-hidden="true">
</div>

<script>
Cards.register('theme', {
  init: function() {
    const STORAGE_KEY = 'CardsColorScheme';

    const getSavedScheme = function() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved === 'light' || saved === 'dark' || saved === 'auto') return saved;
      return 'auto';
    };

    const getSystemScheme = function() {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
      return 'light';
    };

    const isDark = function(scheme, systemScheme) {
      return scheme === 'dark' || (scheme === 'auto' && systemScheme === 'dark');
    };

    const applyScheme = function(scheme, systemScheme) {
      const actualScheme = isDark(scheme, systemScheme) ? 'dark' : 'light';
      document.documentElement.setAttribute('data-scheme', actualScheme);
      if (actualScheme === 'dark') {
        document.body.classList.add('dark-theme');
      } else {
        document.body.classList.remove('dark-theme');
      }
      window.dispatchEvent(new CustomEvent('onColorSchemeChange', {
        detail: actualScheme
      }));
    };

    const systemListener = function(e) {
      const scheme = getSavedScheme();
      if (scheme === 'auto') {
        const systemScheme = e.matches ? 'dark' : 'light';
        applyScheme('auto', systemScheme);
      }
    };

    const scheme = getSavedScheme();
    const systemScheme = getSystemScheme();
    applyScheme(scheme, systemScheme);

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', systemListener);

    return { systemListener: systemListener, STORAGE_KEY: STORAGE_KEY, getSavedScheme: getSavedScheme, getSystemScheme: getSystemScheme, applyScheme: applyScheme };
  },
  destroy: function(instance) {
    window.matchMedia('(prefers-color-scheme: dark)').removeEventListener('change', instance.systemListener);
  }
});

Cards.actions['theme:toggle'] = function() {
  const STORAGE_KEY = 'CardsColorScheme';

  const getSavedScheme = function() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved === 'light' || saved === 'dark' || saved === 'auto') return saved;
    return 'auto';
  };

  const getSystemScheme = function() {
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
    return 'light';
  };

  const isDark = function(scheme, systemScheme) {
    return scheme === 'dark' || (scheme === 'auto' && systemScheme === 'dark');
  };

  const applyScheme = function(scheme, systemScheme) {
    const actualScheme = isDark(scheme, systemScheme) ? 'dark' : 'light';
    document.documentElement.setAttribute('data-scheme', actualScheme);
    if (actualScheme === 'dark') {
      document.body.classList.add('dark-theme');
    } else {
      document.body.classList.remove('dark-theme');
    }
    window.dispatchEvent(new CustomEvent('onColorSchemeChange', {
      detail: actualScheme
    }));
  };

  const currentScheme = getSavedScheme();
  const systemScheme = getSystemScheme();
  const currentActual = isDark(currentScheme, systemScheme) ? 'dark' : 'light';
  let newScheme;

  if (currentActual === 'dark') {
    newScheme = 'light';
  } else {
    newScheme = 'dark';
  }

  if (newScheme === systemScheme) {
    newScheme = 'auto';
  }

  localStorage.setItem(STORAGE_KEY, newScheme);
  applyScheme(newScheme, systemScheme);
};
</script>
