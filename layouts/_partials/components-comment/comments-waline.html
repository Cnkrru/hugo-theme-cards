{{- if .Site.Params.comments.enabled -}}
{{- if eq .Site.Params.comments.provider "waline" -}}
<div class="comment-section">
  <div class="comment-header">
    <h3 data-i18n="commentTitle">评论</h3>
    <span id="waline-comment-count" class="comment-count" style="display: none;"></span>
  </div>
  <div id="waline" class="comment-container"></div>
</div>

<style>
.comment-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 8px;
  background-color: var(--common-bg);
  border: 1px solid var(--common-color-1);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.comment-section:hover {
  transform: translateY(-2px);
}

.comment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--common-color-1);
}

.comment-header h3 {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 600;
  background: linear-gradient(45deg, var(--common-color-1), var(--common-color-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.comment-count {
  font-size: 0.9rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 12px;
  transition: all 0.3s ease;
  color: var(--common-text);
  background: var(--common-hover);
}

.comment-container {
  width: 100%;
  min-height: 300px;
}

@media (max-width: 576px) {
  .comment-section {
    margin-top: 1rem;
    padding: 1rem;
  }

  .comment-header h3 {
    font-size: 1.1rem;
  }
}
</style>

<link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css" />
<script type="module">
  import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

  const waline = init({
    el: '#waline',
    serverURL: '{{ .Site.Params.comments.waline.serverURL }}',
    lang: '{{ .Site.Params.comments.waline.lang | default "zh-CN" }}',
    dark: document.body.classList.contains('dark-theme') ? 'html.dark-theme' : false,
    meta: {{ .Site.Params.comments.waline.requiredMeta | default `["nick", "mail"]` | safeJS }},
    requiredMeta: {{ .Site.Params.comments.waline.requiredMeta | default `["nick"]` | safeJS }},
    emoji: {{ .Site.Params.comments.waline.emoji | default `["https://cdn.jsdelivr.net/gh/walinejs/emojis/weibo"]` | safeJS }},
    wordLimit: {{ .Site.Params.comments.waline.wordLimit | default 0 }},
    pageSize: {{ .Site.Params.comments.waline.pageSize | default 10 }},
    visitor: {{ .Site.Params.comments.waline.visitor | default true }},
    comment: true,
  });

  // 监听主题变化
  const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
        const isDark = document.body.classList.contains('dark-theme');
        waline.update({
          dark: isDark ? 'html.dark-theme' : false
        });
      }
    });
  });

  observer.observe(document.body, { attributes: true });
</script>
{{- end -}}
{{- end -}}
