{{- if .Site.Params.comments.enabled -}}
{{- if eq .Site.Params.comments.provider "utterances" -}}
<div class="comment-section">
  <div class="comment-header">
    <h3 data-i18n="commentTitle">评论</h3>
  </div>
  <div class="comment-container">
    <script src="https://utteranc.es/client.js"
      repo="{{ .Site.Params.comments.utterances.repo }}"
      issue-term="{{ .Site.Params.comments.utterances.issueTerm | default "pathname" }}"
      theme="{{ .Site.Params.comments.utterances.theme | default "preferred-color-scheme" }}"
      crossorigin="anonymous"
      async>
    </script>
  </div>
</div>

<style>
.comment-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 8px;
  background-color: var(--common-bg);
  border: 1px solid var(--common-color-1);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.comment-section:hover {
  transform: translateY(-2px);
}

.comment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--common-color-1);
}

.comment-header h3 {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 600;
  background: linear-gradient(45deg, var(--common-color-1), var(--common-color-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.comment-container {
  width: 100%;
  min-height: 300px;
}

@media (max-width: 576px) {
  .comment-section {
    margin-top: 1rem;
    padding: 1rem;
  }

  .comment-header h3 {
    font-size: 1.1rem;
  }
}
</style>
{{- end -}}
{{- end -}}
