{{- if .Site.Params.comments.enabled -}}
{{- if eq .Site.Params.comments.provider "twikoo" -}}
<div class="comment-section">
  <div class="comment-header">
    <h3 data-i18n="commentTitle">评论</h3>
    <span id="twikoo-comment-count" class="comment-count" style="display: none;"></span>
  </div>
  <div id="twikoo" class="comment-container"></div>
</div>

<style>
.comment-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 8px;
  background-color: var(--common-bg);
  border: 1px solid var(--common-color-1);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.comment-section:hover {
  transform: translateY(-2px);
}

.comment-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--common-color-1);
}

.comment-header h3 {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 600;
  background: linear-gradient(45deg, var(--common-color-1), var(--common-color-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.comment-count {
  font-size: 0.9rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 12px;
  transition: all 0.3s ease;
  color: var(--common-text);
  background: var(--common-hover);
}

.comment-container {
  width: 100%;
  min-height: 300px;
}

@media (max-width: 576px) {
  .comment-section {
    margin-top: 1rem;
    padding: 1rem;
  }

  .comment-header h3 {
    font-size: 1.1rem;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.39/dist/twikoo.all.min.js"></script>
<script>
  twikoo.init({
    envId: '{{ .Site.Params.comments.twikoo.envId }}',
    el: '#twikoo',
    region: '{{ .Site.Params.comments.twikoo.region | default "ap-guangzhou" }}',
    path: '{{ .Site.Params.comments.twikoo.path | default "window.location.pathname" }}',
    lang: '{{ .Site.Params.comments.twikoo.lang | default "zh-CN" }}',
  }).then(() => {
    console.log('[twikoo] 评论系统加载成功');
  }).catch((err) => {
    console.error('[twikoo] 评论系统加载失败:', err);
  });
</script>
{{- end -}}
{{- end -}}
