{{ if .Site.Params.search.enable }}
<div class="search-wrapper">
  <div class="search-card search-container">
    <input type="text" data-i18n-placeholder="search" placeholder="{{ or .Site.Params.search.placeholder "搜索" }}" id="header-search-input">
  </div>

  <div id="search-results-panel" class="search-results" style="display: none;">
    <div id="search-empty" class="search-empty" style="display: none;">
      <span data-i18n="search">搜索</span>: "<span id="search-query"></span>" - <span data-i18n="searchNoResult">未找到结果</span>
    </div>

    <div id="search-content" style="display: none;">
      <div class="search-counter">
        <span id="search-count">0</span> <span data-i18n="searchResults">个结果</span>
      </div>
      <div id="search-results-list"></div>
    </div>
  </div>
</div>
{{- end -}}

<style>
.search-wrapper {
  position: relative;
  flex: 1;
  max-width: 400px;
  min-width: 120px;
}

.search-card {
  position: relative;
  width: 100%;
  height: 40px;
  margin: 0;
  padding: 0 16px;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.search-card input {
  width: 100%;
  font-size: 14px;
  outline: none;
  box-sizing: border-box;
  transition: color 0.3s ease;
}

.search-results {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  max-height: 400px;
  width: 100%;
  border-radius: 8px;
  overflow-y: auto;
  z-index: 9999;
}

.search-empty {
  padding: 16px;
  text-align: center;
}

.search-counter {
  padding: 8px 16px;
  font-size: 12px;
}

.search-result-item {
  padding: 12px 16px;
  transition: background-color 0.2s ease;
  cursor: pointer;
}

.result-title {
  font-weight: bold;
  margin-bottom: 4px;
}

.result-meta {
  font-size: 13px;
  margin-bottom: 4px;
}

.result-tags {
  font-size: 12px;
  margin-top: 4px;
}

.result-tags .tag {
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  margin-right: 4px;
  display: inline-block;
}

@media (max-width: 768px) {
  .search-results {
    max-height: 60vh;
  }
}
</style>

<style>
.search-card {
  border: 2px solid var(--common-color-1);
  background-color: var(--common-bg);
}

.search-card input {
  color: var(--common-text);
  background-color: transparent;
}

.search-results {
  background-color: var(--common-bg);
  border: 2px solid var(--common-color-1);
}

.search-empty {
  color: var(--common-text);
}

.search-counter {
  color: var(--common-text);
  border-bottom: 1px solid var(--common-color-1);
}

.search-result-item {
  background-color: var(--common-bg);
  color: var(--common-text);
}

.search-result-item:hover {
  background-color: var(--common-hover);
}

.result-title {
  color: var(--common-text);
}

.result-meta {
  color: var(--common-text);
}

.result-tags .tag {
  background-color: var(--common-color-1);
  color: var(--common-text);
}
</style>

<style>
@media (max-width: 768px) {
  .search-card {
    width: 80%;
    max-width: none;
  }
}

@media (max-width: 1024px) {
  .search-card {
    max-width: 400px;
  }
}

@media (max-width: 1200px) {
  .search-card {
    max-width: 500px;
  }
}

@media (max-width: 1440px) {
  .search-card {
    max-width: 600px;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
let searchData = null;
let fuse = null;
let searchInput = null;
let searchResultsPanel = null;

const escapeHtml = (text) => {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
};

const highlightMatch = (text, query) => {
  if (!query || !text) return text;
  const escapedQuery = escapeHtml(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const regex = new RegExp('(' + escapedQuery + ')', 'gi');
  return text.replace(regex, '<mark>$1</mark>');
};

const getSearchData = async () => {
  if (!searchData) {
    try {
      if (window.searchIndexData) {
        searchData = window.searchIndexData;
      } else {
        const response = await fetch('/index.json');
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        searchData = await response.json();
      }

      const options = {
        keys: [
          { name: 'title', weight: 0.4 },
          { name: 'content', weight: 0.3 },
          { name: 'tags', weight: 0.2 },
          { name: 'category', weight: 0.1 }
        ],
        includeScore: true,
        includeMatches: true,
        threshold: 0.4,
        minMatchCharLength: 1
      };
      fuse = new Fuse(searchData, options);
    } catch (err) {
      console.error('Failed to load search data:', err);
      searchData = [];
    }
  }
  return { searchData, fuse };
};

const performSearch = async (query) => {
  if (!query || query.trim() === '') {
    hideSearchResults();
    return;
  }

  query = query.trim();
  const { fuse } = await getSearchData();

  if (!fuse) {
    console.error('Fuse.js not initialized');
    return;
  }

  const results = fuse.search(query);
  displayResults(results, query);
};

const displayResults = (results, query) => {
  const panel = document.getElementById('search-results-panel');
  const emptyDiv = document.getElementById('search-empty');
  const contentDiv = document.getElementById('search-content');
  const countSpan = document.getElementById('search-count');
  const listDiv = document.getElementById('search-results-list');
  const querySpan = document.getElementById('search-query');

  if (!panel) return;

  panel.style.display = 'block';

  if (results.length === 0) {
    emptyDiv.style.display = 'block';
    contentDiv.style.display = 'none';
    if (querySpan) querySpan.textContent = escapeHtml(query);
  } else {
    emptyDiv.style.display = 'none';
    contentDiv.style.display = 'block';
    if (countSpan) countSpan.textContent = results.length;

    if (listDiv) {
      listDiv.innerHTML = '';
      results.forEach(result => {
        const item = result.item;
        const resultItem = document.createElement('div');
        resultItem.className = 'search-result-item';
        resultItem.onclick = () => {
          window.location.href = item.permalink;
        };

        const titleDiv = document.createElement('div');
        titleDiv.className = 'result-title';
        titleDiv.innerHTML = highlightMatch(item.title, query);

        const metaDiv = document.createElement('div');
        metaDiv.className = 'result-meta';
        var t = window.i18nTranslations && window.i18nTranslations[window.i18nCurrentLang];
        const categoryText = item.category || (t ? t['uncategorized'] : '未分类');
        const idText = item.permalink ? item.permalink.split('/').filter(Boolean).pop() : '';
        metaDiv.innerHTML = (t ? t['category'] : '分类') + ': ' + highlightMatch(categoryText, query) +
                           ' | ID: ' + highlightMatch(idText, query);

        resultItem.appendChild(titleDiv);
        resultItem.appendChild(metaDiv);

        if (item.tags && item.tags.length > 0) {
          const tagsDiv = document.createElement('div');
          tagsDiv.className = 'result-tags';
          item.tags.forEach(tag => {
            const tagSpan = document.createElement('span');
            tagSpan.className = 'tag';
            tagSpan.textContent = tag;
            tagsDiv.appendChild(tagSpan);
          });
          resultItem.appendChild(tagsDiv);
        }

        listDiv.appendChild(resultItem);
      });
    }
  }
};

const hideSearchResults = () => {
  const panel = document.getElementById('search-results-panel');
  if (panel) {
    panel.style.display = 'none';
  }
};

document.addEventListener('DOMContentLoaded', () => {
  getSearchData();

  searchInput = document.querySelector('.search-card input');
  searchResultsPanel = document.getElementById('search-results-panel');

  if (searchInput) {
    let debounceTimer;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        performSearch(e.target.value);
      }, 300);
    });

    searchInput.addEventListener('focus', (e) => {
      if (e.target.value.trim()) {
        performSearch(e.target.value);
      }
    });
  }

  document.addEventListener('click', (e) => {
    if (searchResultsPanel && searchInput &&
        !searchResultsPanel.contains(e.target) &&
        !searchInput.contains(e.target)) {
      hideSearchResults();
    }
  });
});
</script>
