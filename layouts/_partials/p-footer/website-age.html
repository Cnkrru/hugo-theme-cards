<div class="footer-element-card website-age">
  <span data-i18n="websiteAge">本站已建立</span> <span id="website-age"></span>
</div>

<script>
Cards.register('website-age', {
  init: function() {
    const siteCreated = '{{ .Site.Params.footer.since | default "2026-03-28T12:00:00" }}';
    const startTime = new Date(siteCreated).getTime();

    const updateAge = function() {
      const now = Date.now();
      const diff = now - startTime;

      if (diff < 0) {
        const el = document.getElementById('website-age');
        if (el) el.textContent = '即将上线';
        return;
      }

      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      const months = Math.floor(days / 30);
      const years = Math.floor(months / 12);

      const displayMonths = months % 12;
      const displayDays = days % 30;
      const displayHours = hours % 24;
      const displayMinutes = minutes % 60;
      const displaySeconds = seconds % 60;

      const padZero = function(num) {
        return num.toString().padStart(2, '0');
      };

      const t = window.i18nTranslations && window.i18nTranslations[window.i18nCurrentLang];
      const yearLabel = t ? t['year'] : '年';
      const monthLabel = t ? t['month'] : '月';
      const dayLabel = t ? t['day'] : '天';
      const hourLabel = t ? t['hourShort'] : '时';
      const minuteLabel = t ? t['minuteShort'] : '分';
      const secondLabel = t ? t['secondShort'] : '秒';

      const el = document.getElementById('website-age');
      if (el) {
        el.textContent =
          years + yearLabel + displayMonths + monthLabel + displayDays + dayLabel + ' ' +
          padZero(displayHours) + hourLabel + padZero(displayMinutes) + minuteLabel + padZero(displaySeconds) + secondLabel;
      }
    };

    updateAge();
    const timerId = setInterval(updateAge, 1000);

    return { timerId: timerId };
  },
  destroy: function(instance) {
    if (instance.timerId) clearInterval(instance.timerId);
  }
});
</script>

<style>
.website-age {
  width: 100%;
  text-align: center;
  font-size: 0.9rem;
}
</style>

<style>
.website-age {
  color: var(--common-content);
}
</style>

<style>
@media (max-width: 768px) {
  .website-age {
    text-align: left;
  }
}
</style>
