{{ define "main" }}
<!-- 中心卡片头部区域 -->
<div class="center-head-card">
  <h2>关于</h2>
</div>

<hr>

<!-- 关于页面内容区域 -->
<div class="center-card-content">
  <div class="about-center-card-body">
    <article class="about-content">
      {{ .Content }}
    </article>
  </div>
</div>

<hr>

<style>
/* 关于页面布局样式 */
.about-center-card-body {
  width: 100%;
  height: auto;
  overflow: visible;
}

.about-content {
  line-height: 1.8;
  font-size: 16px;
}

.about-content h1,
.about-content h2,
.about-content h3,
.about-content h4,
.about-content h5,
.about-content h6 {
  margin-top: 24px;
  margin-bottom: 16px;
  font-weight: 600;
  line-height: 1.25;
}

.about-content h1 {
  font-size: 28px;
  border-bottom: 2px solid var(--common-color-1);
  padding-bottom: 8px;
}

.about-content h2 {
  font-size: 24px;
  border-bottom: 1px solid var(--common-color-1);
  padding-bottom: 6px;
}

.about-content h3 {
  font-size: 20px;
}

.about-content p {
  margin-bottom: 16px;
}

.about-content a {
  color: var(--common-hover);
  text-decoration: underline;
}

.about-content a:hover {
  opacity: 0.8;
}

.about-content ul,
.about-content ol {
  margin-bottom: 16px;
  padding-left: 24px;
}

.about-content li {
  margin-bottom: 4px;
}

.about-content blockquote {
  border-left: 4px solid var(--common-color-1);
  padding-left: 16px;
  margin: 16px 0;
  color: var(--common-text);
  opacity: 0.9;
}

.about-content code {
  background-color: var(--common-color-1);
  opacity: 0.2;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
}

.about-content pre {
  background-color: var(--common-bg);
  border: 1px solid var(--common-color-1);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin-bottom: 16px;
}

.about-content pre code {
  background: none;
  padding: 0;
  border-radius: 0;
}

.about-content img {
  max-width: 100%;
  border-radius: 8px;
  margin: 16px 0;
}

.about-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
}

.about-content th,
.about-content td {
  border: 1px solid var(--common-color-1);
  padding: 8px 12px;
  text-align: left;
}

.about-content th {
  background-color: var(--common-color-1);
  opacity: 0.3;
  font-weight: 600;
}
</style>

<style>
/* 关于页面颜色 */
.about-content {
  color: var(--common-text);
}
</style>

<style>
/* 关于页面响应式 */
@media (max-width: 576px) {
  .about-content h1 {
    font-size: 22px;
  }

  .about-content h2 {
    font-size: 20px;
  }

  .about-content h3 {
    font-size: 18px;
  }

  .about-content {
    font-size: 14px;
  }
}

@media (max-width: 768px) {
  .about-content h1 {
    font-size: 24px;
  }

  .about-content h2 {
    font-size: 22px;
  }

  .about-content h3 {
    font-size: 19px;
  }
}
</style>
{{ end }}
