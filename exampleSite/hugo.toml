# ─── 基本信息 ──────────────────────────────────────────
baseURL = 'https://example.org/'
languageCode = 'zh-cn'
title = 'Cards Demo'
theme = '.'
defaultContentLanguage = 'zh-cn'

# ─── 分类法 ────────────────────────────────────────────
[taxonomies]
    tag = 'tags'
    category = 'categories'

# ─── Sitemap ───────────────────────────────────────────
[sitemap]
    filename = "sitemap.xml"
    changefreq = "weekly"
    priority = 0.5

# Rss
[outputs]
    home = ['HTML', 'RSS']

# ─── 侧边栏导航 ────────────────────────────────────────
# name 使用 i18n 键名自动翻译
[menus]
    [[menus.sidebar_links]]
        name = 'home'
        url = '/list/'
        weight = 1
    [[menus.sidebar_links]]
        name = 'about'
        url = '/about/'
        weight = 2
    [[menus.sidebar_links]]
        name = 'archives'
        url = '/categories/'
        weight = 3
    [[menus.sidebar_links]]
        name = 'tags'
        url = '/tags/'
        weight = 4
    [[menus.sidebar_links]]
        name = 'links'
        url = '/links/'
        weight = 5

# ════════════════════════════════════════════════════════
#  参数配置
# ════════════════════════════════════════════════════════
[params]
    # 文章放在哪个 section 下
    mainSections = ['posts']

    description = '一个基于 Hugo 的卡片式博客主题'
    author = 'Your Name'

    # ─── 首页 ──────────────────────────────────────────
    homepageTitle = '文章列表'

    [params.homepage]
        showArticleCount = true
        articlesPerPage = 6

    [params.homepage.articleCountBtn]
        enabled = true
        text = '共 {{ . }} 篇文章'

    # ─── 页脚 ──────────────────────────────────────────
    [params.footer]
        since = '2024-01-01T00:00:00'
        showWebsiteAge = true
        customText = 'Proudly published with Hugo & Cards Theme'

        [params.footer.copyright]
            enabled = true
            text = '© {{ now.Year }} {{ .Site.Title }}. All rights reserved.'

    # ─── 侧边栏 ────────────────────────────────────────
    [params.sidebar]
        compact = false

        [params.sidebar.avatar]
            enabled = true
            src = '/images/avatar.jpg'

        [params.sidebar.welcome]
            enabled = true
            subtitle = '欢迎来到我的个人博客'

        [params.sidebar.links]
            enabled = true
            links = []

    # ─── 小部件 ────────────────────────────────────────
    [params.widgets.sidebar]
        enabled = true
        widgets = ['avatar', 'welcome', 'links']

    # ─── 移动端 ────────────────────────────────────────
    [params.mobile.sidebarWidgets]
        enabled = true
        widgets = ['avatar', 'welcome', 'links']

    # ─── 头部 ──────────────────────────────────────────
    [params.header]
        [params.header.readingProgress]
            enabled = true

        [params.header.logo]
            enabled = true
            text = 'Cards Blog'
            font = 'Georgia, serif'

    # ─── 文章 ──────────────────────────────────────────
    [params.article]
        readingTime = true
        math = false

        [params.article.license]
            enabled = true
            default = 'CC BY-NC-SA 4.0'

        [params.article.related]
            enabled = true
            title = '相关文章'

        [params.article.page]
            showToc = true
            showReadingTime = true
            showWordCount = true
            showRelatedArticles = true
            showComments = true
            showShare = true

        [params.article.share]
            enabled = true

        [params.article.toc]
            enabled = true
            collapsed = false
            maxDepth = 3

        [params.article.tocButton]
            enabled = true
            icon = '/images/svg/toc.svg'

        [params.article.backToTop]
            enabled = true
            icon = '/images/svg/arrow-up.svg'

        [params.article.listCard]
            showCategory = true
            showTags = true
            showDate = true
            showId = false

        [params.article.pageMeta]
            showId = false
            showCategory = true
            showTags = true
            showDate = true

        [params.article.pageNav]
            showPrevNext = true
            showArticleCount = true

    # ─── 颜色 ──────────────────────────────────────────
    [params.colorScheme]
        default = 'auto'

    [params.colors]
        [params.colors.light]
            color1 = 'rgba(255, 192, 203, 1)'
            color2 = 'white'
            bg = 'white'
            text = '#333'
            content = 'white'
            hover = 'rgba(255, 192, 203, 1)'
            shadow = 'rgba(0, 0, 0, 0.1)'
            cursor = 'rgba(255, 192, 203, 1)'
            gradient = 'linear-gradient(90deg, #45b7d1, #4ecd8d, #feb47b, #4ecd8d, #45b7d1)'

        [params.colors.dark]
            color1 = '#3aaae7'
            color2 = '#1a237e'
            bg = '#15073c'
            text = 'white'
            hover = '#3aaae7'
            content = '#333'
            shadow = 'rgba(0, 0, 0, 0.3)'
            cursor = '#3aaae7'
            gradient = 'linear-gradient(90deg, #cc45d1, #654ecd, #7b97fe, #654ecd, #cc45d1)'

    # ─── 搜索 ──────────────────────────────────────────
    [params.search]
        enable = true
        mode = 'fuse'
        placeholder = '搜索'

        [params.search.results]
            showCategory = true
            showTags = true
            showDate = false
            maxResults = 20

        [params.search.input]
            placeholder = '搜索'
            width = '400px'
            minWidth = '120px'

    # ─── 评论 ──────────────────────────────────────────
    [params.comments]
        enabled = false
        provider = 'giscus'

        [params.comments.giscus]
            repo = ''
            repoId = ''
            category = ''
            categoryId = ''
            mapping = 'pathname'
            lang = 'zh-CN'

    # ─── 统计 ──────────────────────────────────────────
    [params.analytics]
        enabled = false
        provider = 'google'

        [params.analytics.google]
            trackingID = ''

        [params.analytics.baidu]
            trackingID = ''

    # ─── SEO ───────────────────────────────────────────
    [params.seo]
        enabled = true
        description = 'Cards - 一个卡片式 Hugo 博客主题'
        author = 'Your Name'
        logo = '/images/avatar.jpg'

        [params.seo.twitter]
            site = ''
            card = 'summary_large_image'

    # ─── CDN (可选) ────────────────────────────────────
    # 设为 true 后，Fuse.js 会在构建时本地化，消除 CDN 依赖
    [params.cdn]
        localizeJS = false
        fusejs = 'https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js'
        photoswipe = 'https://cdn.jsdelivr.net/npm/photoswipe@5.3.4/dist'
        katex = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist'

    # ─── 图片处理 ──────────────────────────────────────
    [params.imageProcessing]
        content = true
