(function() {
  const STORAGE_KEY = 'CardsColorScheme';
  const getSavedScheme = function() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved === 'light' || saved === 'dark' || saved === 'auto') return saved;
    return 'auto';
  };
  const getSystemScheme = function() {
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
    return 'light';
  };
  const isDark = function(scheme, systemScheme) {
    return scheme === 'dark' || (scheme === 'auto' && systemScheme === 'dark');
  };
  const scheme = getSavedScheme();
  const systemScheme = getSystemScheme();
  const actualScheme = isDark(scheme, systemScheme) ? 'dark' : 'light';
  document.documentElement.setAttribute('data-scheme', actualScheme);
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>

let searchData = null;
let fuse = null;
let searchInput = null;
let searchResultsPanel = null;


const escapeHtml = (text) => {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
};


const highlightMatch = (text, query) => {
  if (!query || !text) return text;
  const escapedQuery = escapeHtml(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const regex = new RegExp('(' + escapedQuery + ')', 'gi');
  return text.replace(regex, '<mark>$1</mark>');
};


const getSearchData = async () => {
  if (!searchData) {
    try {
      
      if (window.searchIndexData) {
        searchData = window.searchIndexData;
      } else {
        
        const response = await fetch('/index.json');
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        searchData = await response.json();
      }

      
      const options = {
        keys: [
          { name: 'title', weight: 0.4 },
          { name: 'content', weight: 0.3 },
          { name: 'tags', weight: 0.2 },
          { name: 'category', weight: 0.1 }
        ],
        includeScore: true,
        includeMatches: true,
        threshold: 0.4,
        minMatchCharLength: 1
      };
      fuse = new Fuse(searchData, options);
    } catch (err) {
      console.error('Failed to load search data:', err);
      searchData = [];
    }
  }
  return { searchData, fuse };
};


const performSearch = async (query) => {
  if (!query || query.trim() === '') {
    hideSearchResults();
    return;
  }

  query = query.trim();
  const { fuse } = await getSearchData();

  if (!fuse) {
    console.error('Fuse.js not initialized');
    return;
  }

  const results = fuse.search(query);
  displayResults(results, query);
};


const displayResults = (results, query) => {
  const panel = document.getElementById('search-results-panel');
  const emptyDiv = document.getElementById('search-empty');
  const contentDiv = document.getElementById('search-content');
  const countSpan = document.getElementById('search-count');
  const listDiv = document.getElementById('search-results-list');
  const querySpan = document.getElementById('search-query');

  if (!panel) return;

  panel.style.display = 'block';

  if (results.length === 0) {
    emptyDiv.style.display = 'block';
    contentDiv.style.display = 'none';
    if (querySpan) querySpan.textContent = escapeHtml(query);
  } else {
    emptyDiv.style.display = 'none';
    contentDiv.style.display = 'block';
    if (countSpan) countSpan.textContent = results.length;

    if (listDiv) {
      listDiv.innerHTML = '';
      results.forEach(result => {
        const item = result.item;
        const resultItem = document.createElement('div');
        resultItem.className = 'search-result-item';
        resultItem.onclick = () => {
          window.location.href = item.permalink;
        };

        const titleDiv = document.createElement('div');
        titleDiv.className = 'result-title';
        titleDiv.innerHTML = highlightMatch(item.title, query);

        const metaDiv = document.createElement('div');
        metaDiv.className = 'result-meta';
        var t = window.i18nTranslations && window.i18nTranslations[window.i18nCurrentLang];
        const categoryText = item.category || (t ? t['uncategorized'] : '未分类');
        const idText = item.permalink ? item.permalink.split('/').filter(Boolean).pop() : '';
        metaDiv.innerHTML = (t ? t['category'] : '分类') + ': ' + highlightMatch(categoryText, query) +
                           ' | ID: ' + highlightMatch(idText, query);

        resultItem.appendChild(titleDiv);
        resultItem.appendChild(metaDiv);

        if (item.tags && item.tags.length > 0) {
          const tagsDiv = document.createElement('div');
          tagsDiv.className = 'result-tags';
          item.tags.forEach(tag => {
            const tagSpan = document.createElement('span');
            tagSpan.className = 'tag';
            tagSpan.textContent = tag;
            tagsDiv.appendChild(tagSpan);
          });
          resultItem.appendChild(tagsDiv);
        }

        listDiv.appendChild(resultItem);
      });
    }
  }
};


const hideSearchResults = () => {
  const panel = document.getElementById('search-results-panel');
  if (panel) {
    panel.style.display = 'none';
  }
};


document.addEventListener('DOMContentLoaded', () => {
  
  getSearchData();

  searchInput = document.querySelector('.search-card input');
  searchResultsPanel = document.getElementById('search-results-panel');

  if (searchInput) {
    let debounceTimer;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        performSearch(e.target.value);
      }, 300);
    });

    searchInput.addEventListener('focus', (e) => {
      if (e.target.value.trim()) {
        performSearch(e.target.value);
      }
    });
  }

  
  document.addEventListener('click', (e) => {
    if (searchResultsPanel && searchInput &&
        !searchResultsPanel.contains(e.target) &&
        !searchInput.contains(e.target)) {
      hideSearchResults();
    }
  });
});
</script>

  const STORAGE_KEY = 'CardsColorScheme';

  const getSavedScheme = function() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved === 'light' || saved === 'dark' || saved === 'auto') {
      return saved;
    }
    return 'auto';
  };

  const getSystemScheme = function() {
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  };

  const isDark = function(scheme, systemScheme) {
    return scheme === 'dark' || (scheme === 'auto' && systemScheme === 'dark');
  };

  const applyScheme = function(scheme, systemScheme) {
    const actualScheme = isDark(scheme, systemScheme) ? 'dark' : 'light';
    document.documentElement.setAttribute('data-scheme', actualScheme);

    
    if (actualScheme === 'dark') {
      document.body.classList.add('dark-theme');
    } else {
      document.body.classList.remove('dark-theme');
    }

    
    window.dispatchEvent(new CustomEvent('onColorSchemeChange', {
      detail: actualScheme
    }));
  };

  
  const initScheme = function() {
    const scheme = getSavedScheme();
    const systemScheme = getSystemScheme();
    applyScheme(scheme, systemScheme);
  };

  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initScheme);
  } else {
    initScheme();
  }

  
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    const scheme = getSavedScheme();
    if (scheme === 'auto') {
      const systemScheme = e.matches ? 'dark' : 'light';
      applyScheme('auto', systemScheme);
    }
  });

  
  window.toggleTheme = function() {
    const currentScheme = getSavedScheme();
    const systemScheme = getSystemScheme();
    let newScheme;

    
    
    const currentActual = isDark(currentScheme, systemScheme) ? 'dark' : 'light';

    if (currentActual === 'dark') {
      newScheme = 'light';
    } else {
      newScheme = 'dark';
    }

    
    if (newScheme === systemScheme) {
      newScheme = 'auto';
    }

    localStorage.setItem(STORAGE_KEY, newScheme);
    applyScheme(newScheme, systemScheme);
  };
})();
</script>

    });

    const container = document.querySelector('.center-card-content');

        behavior: 'smooth'
      });
    } else {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }
  }
};

const checkImmersiveMode = () => {
  if (document.body.classList.contains('immersive-reading')) {
    backToTopBtn.classList.add('immersive');
  } else {
    backToTopBtn.classList.remove('immersive');
  }
};

document.addEventListener('DOMContentLoaded', () => {
  checkImmersiveMode();

  const observer = new MutationObserver(() => {
    checkImmersiveMode();
  });
  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
});
</script>

  <span data-i18n="websiteAge">本站已建立</span> <span id="website-age"></span>
</div>

<script>
(function() {
  
  const siteCreated = '2026-01-01T00:00:00';
  const startTime = new Date(siteCreated).getTime();

  const padZero = (num) => {
    return num.toString().padStart(2, '0');
  };

  const updateAge = () => {
    const now = Date.now();
    const diff = now - startTime;

    if (diff < 0) {
      document.getElementById('website-age').textContent = '即将上线';
      return;
    }

    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    const months = Math.floor(days / 30);
    const years = Math.floor(months / 12);

    const displayMonths = months % 12;
    const displayDays = days % 30;
    const displayHours = hours % 24;
    const displayMinutes = minutes % 60;
    const displaySeconds = seconds % 60;

    const t = window.i18nTranslations && window.i18nTranslations[window.i18nCurrentLang];
    const yearLabel = t ? t['year'] : '年';
    const monthLabel = t ? t['month'] : '月';
    const dayLabel = t ? t['day'] : '天';
    const hourLabel = t ? t['hourShort'] : '时';
    const minuteLabel = t ? t['minuteShort'] : '分';
    const secondLabel = t ? t['secondShort'] : '秒';
    document.getElementById('website-age').textContent =
      `${years}${yearLabel}${displayMonths}${monthLabel}${displayDays}${dayLabel} ${padZero(displayHours)}${hourLabel}${padZero(displayMinutes)}${minuteLabel}${padZero(displaySeconds)}${secondLabel}`;
  };

  
  updateAge();
  setInterval(updateAge, 1000);
})();
</script>
