  (function() {
    const STORAGE_KEY = 'CardsColorScheme';
    const getSavedScheme = function() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved === 'light' || saved === 'dark' || saved === 'auto') return saved;
      return 'auto';
    };
    const getSystemScheme = function() {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
      return 'light';
    };
    const isDark = function(scheme, systemScheme) {
      return scheme === 'dark' || (scheme === 'auto' && systemScheme === 'dark');
    };
    const scheme = getSavedScheme();
    const systemScheme = getSystemScheme();
    const actualScheme = isDark(scheme, systemScheme) ? 'dark' : 'light';
    document.documentElement.setAttribute('data-scheme', actualScheme);
  })();

<script>
Cards.register('hero-typing', {
  init: function() {
    let typingText = '';
    let typingIndex = 0;
    let isDeleting = false;
    let isPausing = false;
    let lastTime = 0;
    let animationFrameId = null;

    const text = 'Welcome to Cnkrru\'s Blog';
    const typingSpeed = 150;
    const deletingSpeed = 80;
    const pauseTime = 2000;
    const loop = true;
    const randomSpeed = true;

    const targetElement = document.getElementById('index-typing-text');
    if (!targetElement) return { animationFrameId: null };

    const getRandomSpeed = function(baseSpeed) {
      if (!randomSpeed) return baseSpeed;
      return baseSpeed * (0.8 + Math.random() * 0.4);
    };

    const typeEffect = function(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const elapsed = timestamp - lastTime;

      if (isPausing) {
        if (elapsed >= pauseTime) {
          isPausing = false;
          isDeleting = true;
          lastTime = timestamp;
        }
      } else if (!isDeleting) {
        const currentSpeed = getRandomSpeed(typingSpeed);
        if (elapsed >= currentSpeed) {
          if (typingIndex < text.length) {
            typingText = text.substring(0, typingIndex + 1);
            targetElement.textContent = typingText;
            typingIndex++;
            lastTime = timestamp;
          } else if (loop) {
            isPausing = true;
            lastTime = timestamp;
          }
        }
      } else {
        const delSpeed = getRandomSpeed(deletingSpeed);
        if (elapsed >= delSpeed) {
          if (typingIndex > 0) {
            typingIndex--;
            typingText = text.substring(0, typingIndex);
            targetElement.textContent = typingText;
            lastTime = timestamp;
          } else if (loop) {
            isDeleting = false;
            lastTime = timestamp;
          }
        }
      }

      animationFrameId = requestAnimationFrame(typeEffect);
    };

    setTimeout(function() {
      lastTime = 0;
      animationFrameId = requestAnimationFrame(typeEffect);
    }, 300);

    return { animationFrameId: animationFrameId };
  },
  destroy: function(instance) {
    if (instance.animationFrameId) cancelAnimationFrame(instance.animationFrameId);
  }
});
</script>

window.i18nCurrentLang = localStorage.getItem('preferred-language') || 'zh-cn';

Cards.i18nApply = function(lang) {
    const translations = window.i18nTranslations[lang];
    if (!translations) return;

    document.querySelectorAll('[data-i18n]').forEach(function(el) {
        const key = el.getAttribute('data-i18n');
        if (translations[key] !== undefined) {
            el.textContent = translations[key];
        }
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
        const key = el.getAttribute('data-i18n-placeholder');
        if (translations[key] !== undefined) {
            el.placeholder = translations[key];
        }
    });

    document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
        const key = el.getAttribute('data-i18n-title');
        if (translations[key] !== undefined) {
            el.title = translations[key];
        }
    });

    localStorage.setItem('preferred-language', lang);
    window.i18nCurrentLang = lang;
};

Cards.register('i18n', {
  init: function() {
    Cards.i18nApply(window.i18nCurrentLang);
    return {};
  },
  destroy: function() {}
});
